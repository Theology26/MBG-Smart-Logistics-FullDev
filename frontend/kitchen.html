<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBG Smart Logistics — Dashboard Dapur</title>
  <meta name="description" content="Dashboard Admin Dapur untuk input masakan, OCR nota belanja, dan manajemen stok bahan baku">
  <link rel="stylesheet" href="css/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="js/api.js"></script>
</head>
<body>
<div class="app-container" x-data="kitchenApp()">

  <!-- ═══════════════════ HEADER ═══════════════════ -->
  <header class="app-header">
    <a href="#" class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11h18v2a6 6 0 01-6 6H9a6 6 0 01-6-6v-2z"/><path d="M12 3v4"/><path d="M8 5v2"/><path d="M16 5v2"/></svg>
      </div>
      <div>
        <div class="logo-text">MBG Smart Logistics</div>
        <div class="logo-sub">Dashboard Admin Dapur</div>
      </div>
    </a>
    <div class="flex-row">
      <span class="header-badge badge-kitchen">Dapur Utama</span>
      <button class="btn btn-ghost btn-sm" @click="activeTab = activeTab === 'ocr' ? 'production' : 'ocr'" x-text="activeTab === 'ocr' ? 'Produksi' : 'OCR Nota'"></button>
    </div>
  </header>

  <!-- ═══════════════════ TAB: OCR NOTA ═══════════════════ -->
  <div x-show="activeTab === 'ocr'" x-transition class="fade-in">
    <h2 style="margin-bottom: 20px">Scan Nota Belanja — AI OCR</h2>

    <div class="grid-2">
      <!-- LEFT: Image Upload & Preview -->
      <div class="glass-card no-hover flex-col">
        <p class="section-title">Upload Foto Nota</p>

        <div id="dropzone"
          style="border: 2px dashed rgba(255,255,255,0.15); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s;"
          @click="$refs.fileInput.click()"
          @dragover.prevent="$event.currentTarget.style.borderColor='#3b82f6'"
          @dragleave.prevent="$event.currentTarget.style.borderColor='rgba(148,163,184,0.12)'"
          @drop.prevent="handleDrop($event)">
          
          <template x-if="!imagePreview">
            <div>
              <div style="margin-bottom: 12px;"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="14" rx="3"/><circle cx="12" cy="13" r="4"/><path d="M8 6V4h8v2"/></svg></div>
              <p style="color: var(--text-secondary);">Klik atau drag &amp; drop foto nota di sini</p>
              <p class="text-muted" style="font-size: 0.75rem; margin-top: 8px;">JPG, PNG — Maks 10MB</p>
            </div>
          </template>

          <template x-if="imagePreview">
            <img :src="imagePreview" alt="Preview Nota"
              style="max-width: 100%; max-height: 400px; border-radius: 8px; object-fit: contain;">
          </template>
        </div>

        <input type="file" x-ref="fileInput" accept="image/*" @change="handleFileSelect($event)" style="display: none;">

        <button class="btn btn-primary btn-full" @click="scanReceipt" :disabled="!selectedFile || scanning">
          <template x-if="scanning"><span class="spinner"></span></template>
          <span x-text="scanning ? 'Memindai dengan Gemini AI...' : 'Scan dengan Gemini Vision'"></span>
        </button>
      </div>

      <!-- RIGHT: OCR Results (Editable Form) -->
      <div class="glass-card no-hover flex-col">
        <p class="section-title">Hasil Ekstraksi OCR</p>

        <template x-if="!ocrResult">
          <div style="text-align: center; padding: 60px 0; color: var(--text-muted);">
            <div style="margin-bottom: 12px;"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8"/><path d="M8 10h8"/><path d="M8 14h4"/></svg></div>
            <p>Hasil scan akan muncul di sini</p>
            <p style="font-size: 0.8125rem; margin-top: 4px;">Upload dan scan nota untuk memulai</p>
          </div>
        </template>

        <template x-if="ocrResult">
          <div class="flex-col">
            <!-- Confidence Score -->
            <div class="flex-between" style="margin-bottom: 8px;">
              <span class="text-secondary" style="font-size: 0.8125rem;">Akurasi AI</span>
              <span class="status-badge" :class="ocrResult.confidence_score > 0.8 ? 'safe' : 'moderate'"
                x-text="(ocrResult.confidence_score * 100).toFixed(0) + '%'"></span>
            </div>
            <div class="progress-bar" style="margin-bottom: 16px;">
              <div class="progress-fill" :style="'width:' + (ocrResult.confidence_score * 100) + '%'"></div>
            </div>

            <!-- Editable Items Table -->
            <div style="overflow-x: auto;">
              <table style="width: 100%; border-collapse: collapse; font-size: 0.875rem;">
                <thead>
                  <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <th style="text-align: left; padding: 8px; color: var(--text-muted); font-weight: 500;">Bahan</th>
                    <th style="text-align: center; padding: 8px; color: var(--text-muted); font-weight: 500;">Qty</th>
                    <th style="text-align: center; padding: 8px; color: var(--text-muted); font-weight: 500;">Satuan</th>
                    <th style="text-align: right; padding: 8px; color: var(--text-muted); font-weight: 500;">Harga</th>
                    <th style="text-align: right; padding: 8px; color: var(--text-muted); font-weight: 500;">Total</th>
                    <th style="width: 40px;"></th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(item, idx) in ocrResult.items" :key="idx">
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                      <td style="padding: 6px 8px;">
                        <input type="text" class="form-input" style="padding: 6px 8px; font-size: 0.8125rem;" x-model="item.name">
                      </td>
                      <td style="padding: 6px 4px; text-align: center;">
                        <input type="number" class="form-input" style="padding: 6px 4px; font-size: 0.8125rem; text-align: center; width: 60px;" x-model.number="item.quantity">
                      </td>
                      <td style="padding: 6px 4px; text-align: center;">
                        <input type="text" class="form-input" style="padding: 6px 4px; font-size: 0.8125rem; text-align: center; width: 70px;" x-model="item.unit">
                      </td>
                      <td style="padding: 6px 4px; text-align: right;">
                        <input type="number" class="form-input" style="padding: 6px 4px; font-size: 0.8125rem; text-align: right; width: 90px;" x-model.number="item.unit_price">
                      </td>
                      <td style="padding: 6px 8px; text-align: right; font-weight: 600; color: var(--blue-400);"
                        x-text="'Rp ' + (item.quantity * item.unit_price).toLocaleString('id-ID')"></td>
                      <td><button class="btn btn-ghost btn-sm" style="padding: 4px 8px; color: var(--rose-400);" @click="ocrResult.items.splice(idx, 1)">✕</button></td>
                    </tr>
                  </template>
                </tbody>
                <tfoot>
                  <tr style="border-top: 2px solid rgba(255,255,255,0.1);">
                    <td colspan="4" style="padding: 10px 8px; font-weight: 700;">SUBTOTAL</td>
                    <td style="padding: 10px 8px; text-align: right; font-weight: 800; color: var(--blue-400); font-size: 1rem;"
                      x-text="'Rp ' + ocrResult.items.reduce((sum, i) => sum + (i.quantity * i.unit_price), 0).toLocaleString('id-ID')"></td>
                    <td></td>
                  </tr>
                </tfoot>
              </table>
            </div>

            <template x-if="ocrResult.notes">
              <div class="alert alert-info" style="margin-top: 8px;">
                <span class="alert-icon">ℹ️</span>
                <div class="alert-content">
                  <div class="alert-title">Catatan AI</div>
                  <span x-text="ocrResult.notes"></span>
                </div>
              </div>
            </template>

            <button class="btn btn-success btn-full" style="margin-top: 8px;" @click="confirmOCR" :disabled="confirming">
              <template x-if="confirming"><span class="spinner"></span></template>
              <span x-text="confirming ? 'Menyimpan...' : '✅ Konfirmasi & Update Stok'"></span>
            </button>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ TAB: PRODUCTION TRIGGER ═══════════════════ -->
  <div x-show="activeTab === 'production'" x-transition class="fade-in">
    <h2 style="margin-bottom: 20px">Masakan Matang — Production Trigger</h2>

    <!-- Shelf-Life Warning Alert (appears after analysis) -->
    <template x-if="shelfLifeResult">
      <div :class="'alert alert-' + (shelfLifeResult.risk_level === 'critical' ? 'danger' : shelfLifeResult.risk_level === 'high' ? 'danger' : 'warning')"
        style="margin-bottom: 20px;">
        <span class="alert-icon" x-text="shelfLifeResult.risk_level === 'critical' ? '🚨' : '⏰'"></span>
        <div class="alert-content">
          <div class="alert-title" x-text="'⏱️ Max Delivery Window: ' + shelfLifeResult.max_delivery_window_minutes + ' Menit (' + (shelfLifeResult.max_delivery_window_minutes / 60).toFixed(1) + ' Jam)'"></div>
          <p x-text="'Kategori: ' + shelfLifeResult.category + ' | Shelf-life: ' + shelfLifeResult.shelf_life_minutes + ' menit | Risk: ' + shelfLifeResult.risk_level.toUpperCase()"></p>
          <p style="margin-top: 4px; opacity: 0.8;" x-text="'💡 ' + shelfLifeResult.storage_tips"></p>
        </div>
        <span class="status-badge" :class="shelfLifeResult.risk_level" x-text="shelfLifeResult.risk_level"></span>
      </div>
    </template>

    <div class="grid-2">
      <!-- LEFT: Production Form -->
      <div class="glass-card no-hover flex-col">
        <p class="section-title">Input Data Produksi</p>

        <div class="form-group">
          <label class="form-label">Nama Masakan</label>
          <input type="text" class="form-input" x-model="prodForm.dishName" placeholder="Contoh: Sop Ayam Wortel">
        </div>

        <div class="grid-2" style="gap: 12px;">
          <div class="form-group">
            <label class="form-label">Total Porsi</label>
            <input type="number" class="form-input" x-model.number="prodForm.totalPortions" min="1" placeholder="500">
          </div>
          <div class="form-group">
            <label class="form-label">Waktu Matang</label>
            <input type="datetime-local" class="form-input" x-model="prodForm.cookedAt">
          </div>
        </div>

        <!-- School Assignments -->
        <p class="section-title" style="margin-top: 16px;">Alokasi Sekolah</p>

        <template x-for="(assign, idx) in prodForm.assignments" :key="idx">
          <div class="flex-row" style="gap: 8px;">
            <select class="form-select" x-model="assign.school_id" style="flex: 2;">
              <option value="">-- Pilih Sekolah --</option>
              <template x-for="s in schools" :key="s.id">
                <option :value="s.id" x-text="s.name + ' (' + s.area + ')'"></option>
              </template>
            </select>
            <input type="number" class="form-input" x-model.number="assign.allocated_portions" min="1"
              placeholder="Porsi" style="flex: 1; text-align: center;">
            <button class="btn btn-ghost btn-icon" style="color: var(--rose-400); flex-shrink: 0;"
              @click="prodForm.assignments.splice(idx, 1)">✕</button>
          </div>
        </template>

        <button class="btn btn-ghost btn-sm" @click="prodForm.assignments.push({school_id: '', allocated_portions: 0})">
          ＋ Tambah Sekolah
        </button>

        <!-- Summary -->
        <div class="flex-between" style="padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-top: 8px;">
          <span class="text-secondary" style="font-size: 0.875rem;">Total Dialokasikan</span>
          <span style="font-weight: 700; font-size: 1.125rem;"
            :class="totalAllocated > prodForm.totalPortions ? 'text-rose' : 'text-emerald'"
            x-text="totalAllocated + ' / ' + prodForm.totalPortions + ' porsi'"></span>
        </div>

        <button class="btn btn-primary btn-full btn-lg" @click="triggerProduction" :disabled="submitting || !prodForm.dishName">
          <template x-if="submitting"><span class="spinner"></span></template>
          <span x-text="submitting ? 'Menganalisis Shelf-Life...' : 'Mulai Produksi & Analisis Shelf-Life'"></span>
        </button>
      </div>

      <!-- RIGHT: Production Result / Active Productions -->
      <div class="glass-card no-hover flex-col">
        <p class="section-title">Produksi Aktif</p>

        <template x-if="productionResult">
          <div class="alert alert-success" style="margin-bottom: 16px;">
            <span class="alert-icon">✅</span>
            <div class="alert-content">
              <div class="alert-title">Produksi Berhasil Dibuat!</div>
              <p x-text="'Deadline: ' + formatTime(productionResult.deadline)"></p>
              <p style="margin-top: 4px; font-size: 0.8125rem;"  x-text="productionResult.next_step"></p>
            </div>
          </div>
        </template>

        <template x-for="prod in activeProductions" :key="prod.id">
          <div class="stop-item" style="margin-bottom: 8px;">
            <div>
              <div class="stop-name" x-text="prod.dish_name"></div>
              <div class="stop-meta">
                <span x-text="prod.total_portions + ' porsi'"></span> ·
                <span x-text="'Deadline: ' + formatTime(prod.deadline_at)"></span>
              </div>
            </div>
            <div style="text-align: right;">
              <span class="status-badge" :class="prod.risk_level" x-text="prod.risk_level"></span>
              <div class="stop-meta" style="margin-top: 4px;" x-text="prod.status"></div>
            </div>
          </div>
        </template>

        <template x-if="activeProductions.length === 0 && !productionResult">
          <div style="text-align: center; padding: 40px 0; color: var(--text-muted);">
            <div style="margin-bottom: 8px;"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></div>
            <p>Belum ada produksi aktif</p>
          </div>
        </template>
      </div>
    </div>
  </div>

</div>

<script>
function kitchenApp() {
  return {
    activeTab: 'production',
    
    // ── OCR State ──
    selectedFile: null,
    imagePreview: null,
    scanning: false,
    confirming: false,
    ocrResult: null,
    
    // ── Production State ──
    schools: [],
    shelfLifeResult: null,
    productionResult: null,
    activeProductions: [],
    submitting: false,
    prodForm: {
      dishName: '',
      totalPortions: 500,
      cookedAt: new Date().toISOString().slice(0, 16),
      assignments: [{ school_id: '', allocated_portions: 0 }]
    },

    get totalAllocated() {
      return this.prodForm.assignments.reduce((sum, a) => sum + (a.allocated_portions || 0), 0);
    },

    async init() {
      const res = await API.getSchools();
      if (res.data) this.schools = res.data;

      const prod = await API.getActiveProductions();
      if (prod.data) this.activeProductions = prod.data;
    },

    // ── OCR Methods ──
    handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      this.selectedFile = file;
      this.imagePreview = URL.createObjectURL(file);
      this.ocrResult = null;
    },

    handleDrop(event) {
      const file = event.dataTransfer.files[0];
      if (!file || !file.type.startsWith('image/')) return;
      this.selectedFile = file;
      this.imagePreview = URL.createObjectURL(file);
      this.ocrResult = null;
    },

    async scanReceipt() {
      if (!this.selectedFile) return;
      this.scanning = true;
      const result = await API.scanReceipt(this.selectedFile);
      this.scanning = false;
      if (result.data) this.ocrResult = result.data;
    },

    async confirmOCR() {
      if (!this.ocrResult) return;
      this.confirming = true;
      const items = this.ocrResult.items.map(i => ({
        ingredient_name: i.name,
        quantity: i.quantity,
        unit: i.unit,
        unit_price: i.unit_price,
        total_price: i.quantity * i.unit_price
      }));
      const result = await API.confirmOCR('kitchen-1', items, '', JSON.stringify(this.ocrResult));
      this.confirming = false;
      if (result.status === 200) {
        this.ocrResult = null;
        this.imagePreview = null;
        this.selectedFile = null;
        alert('✅ Stok berhasil di-update!');
      }
    },

    // ── Production Methods ──
    async triggerProduction() {
      if (!this.prodForm.dishName || !this.prodForm.totalPortions) return;
      this.submitting = true;
      this.shelfLifeResult = null;

      const cookedAt = new Date(this.prodForm.cookedAt).toISOString();
      const result = await API.startProduction(
        this.prodForm.dishName,
        this.prodForm.totalPortions,
        'kitchen-1',
        cookedAt,
        this.prodForm.assignments.filter(a => a.school_id)
      );

      this.submitting = false;

      if (result.data) {
        this.shelfLifeResult = result.data.shelf_life;
        this.productionResult = result.data;
        const prod = await API.getActiveProductions();
        if (prod.data) this.activeProductions = prod.data;
      }
    },

    formatTime(iso) { return formatTime(iso); }
  };
}
</script>
</body>
</html>
